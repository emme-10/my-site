<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Emme's Portfolio</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Contact Me</h1>
        <p>I'd love to hear from you! Please fill out the form below or reach out via email.</p>
    </header>
    <main>
        <form action="#" method="post" id="contact-form">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Message</button>
        </form>
        <section>
            <h2>Other Ways to Reach Me</h2>
            <p>Email: <a href="mailto:emme@example.com">emme@example.com</a></p>
            <p>LinkedIn: <a href="https://www.linkedin.com/in/emme" target="_blank">linkedin.com/in/emme</a></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Emme. All rights reserved.</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
